<h2 mat-dialog-title>Підтвердження видалення</h2>

<mat-dialog-content>
  <div class="dialog-content">
    <p class="dialog-text">
      Ви дійсно хочете видалити заявку
      <strong>«{{ data.leadTitle }}»</strong>?
    </p>
    <p class="dialog-warning">Цю дію не можна скасувати.</p>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Скасувати</button>
  <button mat-flat-button color="warn" type="button" (click)="confirm()">
    Видалити
  </button>
</mat-dialog-actions>
