<header class="app-header">
  <div class="header-center">
    <div class="brand">Lead Tracker</div>

    <nav class="header-nav">
      <a
        class="nav-link"
        mat-button
        routerLink="/app/board"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Дошка
      </a>
      <a
        class="nav-link"
        mat-button
        routerLink="/app/archive"
        routerLinkActive="active-link"
      >
        Архів
      </a>
      <a
        class="nav-link"
        mat-button
        routerLink="/app/admin/invites"
        routerLinkActive="active-link"
      >
        Адмін-інвайти
      </a>
    </nav>
  </div>

  <div class="header-actions">
    <button mat-stroked-button type="button" class="account-btn">
      <mat-icon>account_circle</mat-icon>
      <span>Акаунт</span>
    </button>
    <button mat-stroked-button type="button" (click)="logout()">Вийти</button>
  </div>
</header>

<main class="shell-content">
  <router-outlet></router-outlet>
</main>
