<div class="admin-invites-page">
  <mat-card *ngIf="!hasAdminKey()" class="key-gate-card">
    <mat-card-title>Admin access</mat-card-title>
    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Admin key</mat-label>
        <input matInput type="password" [formControl]="adminKeyControl" />
        <mat-error
          *ngIf="adminKeyControl.touched && adminKeyControl.hasError('required')"
        >
          Admin key is required
        </mat-error>
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
      <button mat-flat-button color="primary" (click)="saveAdminKey()">
        Save
      </button>
    </mat-card-actions>
    <mat-card-content *ngIf="error()" class="error-text"
      >{{ error() }}</mat-card-content
    >
  </mat-card>

  <ng-container *ngIf="hasAdminKey()">
    <mat-toolbar>
      <span>Invites</span>
      <span class="spacer"></span>
      <button
        mat-flat-button
        color="primary"
        (click)="createInvite()"
        [disabled]="creating() || loading()"
      >
        Create invite
      </button>
    </mat-toolbar>

    <div class="table-wrap">
      <table mat-table [dataSource]="invites()" class="full-width">
        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef>Code</th>
          <td mat-cell *matCellDef="let invite">{{ invite.code }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let invite">{{ invite.status }}</td>
        </ng-container>

        <ng-container matColumnDef="expires_at">
          <th mat-header-cell *matHeaderCellDef>Expires at</th>
          <td mat-cell *matCellDef="let invite">
            {{ invite.expires_at || '-' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="used_at">
          <th mat-header-cell *matHeaderCellDef>Used at</th>
          <td mat-cell *matCellDef="let invite">{{ invite.used_at || '-' }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let invite">
            <button
              mat-stroked-button
              color="warn"
              *ngIf="canRevoke(invite)"
              (click)="revokeInvite(invite.code)"
            >
              Revoke
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      <p *ngIf="loading()" class="simple-text">Loading invites...</p>
      <p *ngIf="!loading() && invites().length === 0" class="simple-text">
        No invites found.
      </p>
      <p *ngIf="error()" class="error-text">{{ error() }}</p>
    </div>
  </ng-container>
</div>
