<div class="auth-page">
  <mat-card class="auth-card">
    <mat-card-title>Register</mat-card-title>
    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" [formControl]="emailControl" />
        <mat-error
          *ngIf="emailControl.touched && emailControl.hasError('required')"
        >
          Email is required
        </mat-error>
        <mat-error
          *ngIf="emailControl.touched && emailControl.hasError('email')"
        >
          Enter a valid email
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" [formControl]="passwordControl" />
        <mat-error
          *ngIf="passwordControl.touched && passwordControl.hasError('required')"
        >
          Password is required
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Invite code</mat-label>
        <input matInput type="text" [formControl]="inviteCodeControl" />
        <mat-error
          *ngIf="inviteCodeControl.touched && inviteCodeControl.hasError('required')"
        >
          Invite code is required
        </mat-error>
      </mat-form-field>

      <p class="error-text" *ngIf="authStore.error()">
        {{ authStore.error() }}
      </p>
    </mat-card-content>

    <mat-card-actions>
      <button
        mat-flat-button
        color="primary"
        (click)="submit()"
        [disabled]="authStore.loading()"
      >
        Register
      </button>
      <a mat-button routerLink="/login">Have account</a>
    </mat-card-actions>
  </mat-card>
</div>
